


<style>
  *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    --bg-primary-main: #EDEFF1;
    --color-primary-button: #6992BD;
    --color-secondary-button: #F3F4F6;
    --color-primary-text: #000;
    --stroke-color-primary: #A5BED7;
    --stroke-color-secondary: #BAC1C9;
    --text-secondary-color: #3A5E84;
    --text-primary-color: #F3F4F6;
    --hover-button-secondary-color:#dcdcdc77;
  }
  body{
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-evenly;
    /* max-height: 100vh; */
  }


  .header__container{
    display: flex;
    align-items: center;
    padding: 16px 20px;
    width: 100%;
    box-shadow: .2px .3px .3px #000;
    /* padding: 8px 4px; */
    height: fit-content;
    flex-grow: 1;
  }


  .logo__img{
    width: 42px;
    height: 42px;
    margin-right: 12px;
  }


  .title__header{
    font-size: 1.5rem;
    font-weight: bolder;
    color: #000;
  }


  /* Main */
  .body__main-container{
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 4px;
    padding: 16px 20px;
    height: 65%;
    width: 100%;
    flex-grow: 2;
    color: var(--color-primary-text);
    background: var(--bg-primary-main);
  }

  .container__main{
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }


  .container__code{
    width: 100%;
    flex-grow: 1;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }


  .container__icon-copy{
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    justify-content: end;
    align-items: start;
    width: 100%;
    height: 100%;
    opacity: 0;
  }


  .copy-icon{
    width: 32px;
    height: 32px;
    margin-left: 8px;
    cursor: pointer;
    transition: all .3s ease;
  }

  .copy-icon:hover{
    transform: scale(1.06);
    filter: brightness(0.95);
    transition: all .3s ease;
  }
  .footer__main-container{
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px;
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }




  .container__buttons{
    display: flex;
    width: 100%;
    font-family: sans-serif;
    justify-content:center ;
    align-items: center;
    padding: 10px;
    gap: 16px;
  }

  .button__container-choice{
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  .choices__tec{
    background: var(--color-secondary-button);
    border: 1.5px solid var(--stroke-color-secondary);
    padding: 8px 38px;
    border-radius: 8px;
    color: var(--text-secondary-color);
    font-size: .8rem;
    cursor: pointer;
    font-weight: 500;
    text-align: center;
    box-shadow: 0px 1px 1px var(--stroke-color-primary);
    flex-grow: 1;
    position: relative;
  }


  .choices__user-tec{
    background-color: var(--color-secondary-button);
    color: var(--text-secondary-color);
    font-size: .8rem;
    font-weight: 500;
    position:absolute;
    top: -500%;
    left: 0;
    right: 0;
    z-index: 1;
    box-shadow: 0px 1px 1px var(--stroke-color-primary);
    width: 170%;
    min-height: 150px;
    gap: 2px;
    padding: 12px  36px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 8px;
    /* pointer-events: none; */
    /* opacity: 0; */
    /* display: none;<-- elementos de opciones */
    }

  .choice{
    width: 100%;
    cursor: pointer;
    text-align: center;
    padding: 8px;
    transition: all .3s ease;
    cursor: pointer;
    position: relative;
  }

  .choice::after{
    content: '';
    position: absolute;
    display: list-item;
    top: 20%;
    left: -10%;
    bottom: 0;
    outline: 2px solid var(--color-primary-text);
    background-color: var(--color-primary-text);
    /* opacity: 0; */
    width: 16px;
    height: 16px;
    transition: all .3s ease;
    border-radius: 100%;
  }

  .choice:nth-child(2)::after, .choice:nth-child(2):before{
    opacity: 0;
    display: none;
  }

  .choice::before{
    content: '';
    position: absolute;
    display: list-item;
    top: 22.5%;
    left: -9.6%;
    bottom: 0;
    background-color: #fff;
    z-index: 10;
    /* opacity: 0; */
    width: 14px;
    height: 14px;
    transition: all .3s ease;
    border-radius: 100%;
    clip-path: polygon(44% 66%, 81% 0, 99% 9%, 63% 75%, 48% 100%, 0 47%, 23% 47%);
  }

  .choice:hover{
    background-color: var(--hover-button-secondary-color);
    opacity: .8;
  }

  .button__container-submit{
    display: flex;
    justify-content: center;
    align-items: center; 
    /* padding: 10px; */
  }
  .button__submit{
    background-color: var(--color-primary-button);
    color: var(--text-primary-color);
    font-size: .8rem;
    gap: 4px;
    letter-spacing: 1px;
    padding: 6px 38px;
    border-radius: 8px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 1.5px solid var(--stroke-color-primary);
  }

  .button__submit:hover{
    opacity: .9;
    transition: all .3s ease;
  }
</style>
